{% extends "base.html" %}
{% block title %}{{ news.title }} - 科技公司 CMS{% endblock %}

{% block content %}
<div class="news-detail-container">
    <div class="news-detail-header">
        <span class="tag">{{ news.category }}</span>
        <h1>{{ news.title }}</h1>
        <span class="news-meta">发布时间：{{ news.date }}</span>
    </div>
    <div class="news-detail-content">
        {{ news.content }}
    </div>
    <div class="news-detail-footer">
        <a href="/news" class="btn btn-secondary">返回新闻列表</a>
        <a href="/" class="btn btn-secondary">返回首页</a>
    </div>
</div>
{% endblock %}
